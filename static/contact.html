<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Joshitori</title>
    <meta name="description" content="Get in touch with the Joshitori team. Report issues, suggest features, or ask questions about joshi wrestling ELO rankings.">
    <link rel="canonical" href="https://joshitori.com/contact">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Joshitori">
    <meta property="og:title" content="Contact | Joshitori">
    <meta property="og:description" content="Get in touch with the Joshitori team. Report issues, suggest features, or ask questions about joshi wrestling ELO rankings.">
    <meta property="og:url" content="https://joshitori.com/contact">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Contact | Joshitori">
    <meta name="twitter:description" content="Get in touch with the Joshitori team. Report issues, suggest features, or ask questions about joshi wrestling ELO rankings.">
    <link rel="icon" href="/static/favicon.ico">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <link rel="stylesheet" href="/static/css/shared.css">
    <style>
        .contact-wrap {
            max-width: 560px;
            margin: 40px auto;
            padding: 0 24px;
        }
        .contact-wrap h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        .contact-wrap p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 28px;
        }
        .contact-form .form-row {
            margin-bottom: 16px;
        }
        .contact-form label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .contact-form input,
        .contact-form textarea {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.85rem;
            transition: border-color 0.15s;
        }
        .contact-form input:focus,
        .contact-form textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        .contact-form textarea {
            min-height: 140px;
            resize: vertical;
        }
        .contact-form .form-submit {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .contact-form .form-submit:hover {
            background: var(--accent-hover);
        }
        .contact-form .form-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .contact-form .form-submit svg {
            width: 16px;
            height: 16px;
        }
        .form-status {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            display: none;
        }
        .form-status.success {
            display: block;
            background: rgba(102, 187, 106, 0.15);
            color: #66bb6a;
            border: 1px solid rgba(102, 187, 106, 0.3);
        }
        .form-status.error {
            display: block;
            background: rgba(244, 67, 54, 0.15);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }
    </style>
</head>
<body>
    <script src="/static/js/nav.js?v=2"></script>
    <script src="/static/js/nav-search.js?v=2"></script>
    <script src="/static/js/nav-burger.js"></script>

    <div class="contact-wrap">
        <h1>📬 Contact</h1>
        <p>Got a question, suggestion, or found a bug? Drop us a message and we'll get back to you.</p>

        <form class="contact-form" id="contactForm">
            <input type="text" name="_honey" style="display:none">
            <div class="form-row">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name" required>
            </div>
            <div class="form-row">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-row">
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="What's on your mind?" required></textarea>
            </div>
            <button type="submit" class="form-submit" id="submitBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                Send Message
            </button>
        </form>
        <div class="form-status" id="formStatus"></div>
    </div>

    <script src="/static/js/footer.js"></script>
    <script>
        const form = document.getElementById('contactForm');
        const submitBtn = document.getElementById('submitBtn');
        const status = document.getElementById('formStatus');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            status.className = 'form-status';
            status.style.display = 'none';

            try {
                const res = await fetch('https://formspree.io/f/mdalgwjv', {
                    method: 'POST',
                    headers: { 'Accept': 'application/json' },
                    body: new FormData(form)
                });

                if (res.ok) {
                    status.textContent = '✅ Message sent! We\'ll get back to you soon.';
                    status.className = 'form-status success';
                    form.reset();
                } else {
                    throw new Error('Failed to send');
                }
            } catch (err) {
                status.textContent = '❌ Something went wrong. Please try again.';
                status.className = 'form-status error';
            }

            submitBtn.disabled = false;
        });
    </script>
</body>
</html>
