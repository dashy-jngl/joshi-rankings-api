<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Predictor | Joshitori</title>
    <meta name="description" content="Predict joshi match outcomes using ELO ratings. Simulate singles and multi-wrestler matches.">
    <link rel="canonical" href="https://joshitori.com/predictor">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Joshitori">
    <meta property="og:title" content="Match Predictor | Joshitori">
    <meta property="og:description" content="Predict joshi match outcomes using ELO ratings. Simulate singles and multi-wrestler matches.">
    <meta property="og:url" content="https://joshitori.com/predictor">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Match Predictor | Joshitori">
    <meta name="twitter:description" content="Predict joshi match outcomes using ELO ratings. Simulate singles and multi-wrestler matches.">
    <link rel="icon" href="/static/favicon.ico">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <link rel="stylesheet" href="/static/css/shared.css">
    <style>
        .mode-tabs {
            display: flex;
            background: var(--bg-card);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 24px;
        }
        
        .mode-tab {
            flex: 1;
            padding: 12px 16px;
            text-align: center;
            background: transparent;
            border: none;
            border-radius: 6px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        .mode-tab.active {
            background: var(--accent);
            color: white;
        }
        
        .mode-tab:hover:not(.active) {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        
        .mode-content {
            display: none;
        }
        
        .mode-content.active {
            display: block;
        }
        
        .team-section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .team-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        
        .team-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .wrestler-input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .wrestler-input {
            position: relative;
            flex: 1;
            min-width: 200px;
        }
        
        .wrestler-input input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }
        
        .wrestler-input input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }
        
        .wrestler-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            z-index: 100;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        
        .wrestler-dropdown.show {
            display: block;
        }
        
        .wrestler-option {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }
        
        .wrestler-option:last-child {
            border-bottom: none;
        }
        
        .wrestler-option:hover {
            background: var(--bg-hover);
        }
        
        .wrestler-option-name {
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .wrestler-option-details {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 2px;
        }
        
        .predict-button, .simulate-button {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 24px;
        }
        
        .predict-button:hover, .simulate-button:hover {
            background: var(--accent-hover);
        }
        
        .predict-button:disabled, .simulate-button:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }
        
        .back-button {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            margin-bottom: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .back-button:hover {
            color: var(--text-primary);
            border-color: var(--accent);
        }
        
        .prediction-results {
            margin-top: 24px;
            display: none;
        }
        
        .prediction-results.show {
            display: block;
        }
        
        .probability-bars {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .probability-bar {
            flex: 1;
            background: var(--bg-card);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }
        
        .probability-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 4px;
        }
        
        .probability-label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .team-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        
        .stat-group {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 16px;
        }
        
        .stat-group-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .stat-item:last-child {
            margin-bottom: 0;
        }
        
        .stat-label {
            color: var(--text-muted);
        }
        
        .stat-value {
            color: var(--text-primary);
            font-weight: 500;
        }
        
        .momentum-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        .momentum-arrow {
            font-size: 0.8rem;
        }
        
        .tournament-options {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .tournament-format {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .format-button {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        
        .format-button.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        
        .format-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .format-option {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .format-option label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .format-option select {
            padding: 8px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
        }
        
        .tournament-wrestlers {
            margin-bottom: 16px;
        }
        
        .tournament-results {
            margin-top: 24px;
            display: none;
        }
        
        .tournament-results.show {
            display: block;
        }
        
        .bracket {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            overflow-x: auto;
        }
        
        .bracket-container {
            display: flex;
            gap: 0;
            overflow-x: auto;
            padding: 20px 0;
        }
        
        .bracket-round {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            min-width: 220px;
            position: relative;
        }
        
        .bracket-round-header {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        
        .bracket-match {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 4px 12px;
            border: 1px solid var(--border);
            margin: 8px 0;
            position: relative;
        }
        
        .bracket-match::after {
            content: '';
            position: absolute;
            right: -20px;
            top: 50%;
            width: 20px;
            height: 2px;
            background: var(--border);
        }
        
        .bracket-round:last-child .bracket-match::after {
            display: none;
        }
        
        .bracket-connector {
            width: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }
        
        .bracket-wrestler {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            margin: 2px 0;
            border-radius: 4px;
            transition: background 0.15s;
        }
        
        .bracket-wrestler.winner {
            background: rgba(74, 222, 128, 0.15);
            border: 1px solid #4ade80;
        }
        
        .bracket-wrestler.loser {
            opacity: 0.5;
        }
        
        .bracket-wrestler-name {
            font-weight: 500;
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        
        .bracket-probability {
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .bracket-probability.favored { color: #4ade80; }
        .bracket-probability.underdog { color: var(--red); }
        
        .round-robin-block {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .block-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
        }
        
        .standings-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        
        .standings-table th,
        .standings-table td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        
        .standings-table th {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        .standings-table td {
            color: var(--text-primary);
        }
        
        .standings-table tr:first-child td {
            color: var(--accent);
            font-weight: 600;
        }
        
        .matches-section {
            margin-top: 16px;
        }
        
        .match-result {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: var(--bg-secondary);
            border-radius: 6px;
            margin-bottom: 8px;
        }
        
        .match-wrestlers {
            font-weight: 500;
        }
        
        .match-result-text {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <script src="/static/js/nav.js?v=2"></script>
<div class="container">
        <div class="page-header">
            <h1>🔮 Match Predictor</h1>
            <p>Predict match outcomes and simulate tournaments using ELO ratings and momentum</p>
        </div>

        <!-- Mode Tabs -->
        <div class="mode-tabs">
            <button class="mode-tab active" data-mode="singles">Singles</button>
            <button class="mode-tab" data-mode="team">Team</button>
            <button class="mode-tab" data-mode="multi">Multi</button>
            <button class="mode-tab" data-mode="tournament">Tournament</button>
        </div>

        <!-- Singles Mode -->
        <div class="mode-content active" id="singles-mode">
            <div class="team-section">
                <div class="team-header">
                    <div class="team-title">Wrestler 1</div>
                </div>
                <div class="wrestler-input-group">
                    <div class="wrestler-input">
                        <input type="text" placeholder="Search for a wrestler..." data-team="1" data-slot="0">
                        <div class="wrestler-dropdown"></div>
                    </div>
                </div>
            </div>

            <div class="team-section">
                <div class="team-header">
                    <div class="team-title">Wrestler 2</div>
                </div>
                <div class="wrestler-input-group">
                    <div class="wrestler-input">
                        <input type="text" placeholder="Search for a wrestler..." data-team="2" data-slot="0">
                        <div class="wrestler-dropdown"></div>
                    </div>
                </div>
            </div>

            <button class="predict-button" onclick="predictMatch('singles')">Predict Match</button>

            <div class="prediction-results" id="singles-results"></div>
        </div>

        <!-- Team Mode (2v2 up to 8v8) -->
        <div class="mode-content" id="team-mode">
            <div style="margin-bottom: 16px;">
                <label style="color: var(--text-muted); font-size: 0.85rem;">Team Size</label>
                <select id="teamSize" style="background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; margin-left: 8px;">
                    <option value="2" selected>2 per team</option>
                    <option value="3">3 per team</option>
                    <option value="4">4 per team</option>
                    <option value="5">5 per team</option>
                    <option value="6">6 per team</option>
                    <option value="7">7 per team</option>
                    <option value="8">8 per team</option>
                </select>
            </div>
            <div id="team-inputs-container"></div>

            <button class="predict-button" onclick="predictMatch('team')">Predict Match</button>

            <div class="prediction-results" id="team-results"></div>
        </div>

        <!-- Multi Mode (3-way up to 8-way, each wrestler solo) -->
        <div class="mode-content" id="multi-mode">
            <div style="margin-bottom: 16px;">
                <label style="color: var(--text-muted); font-size: 0.85rem;">Participants</label>
                <select id="multiSize" style="background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; margin-left: 8px;">
                    <option value="3" selected>3-Way</option>
                    <option value="4">4-Way</option>
                    <option value="5">5-Way</option>
                    <option value="6">6-Way</option>
                    <option value="7">7-Way</option>
                    <option value="8">8-Way</option>
                </select>
            </div>
            <div id="multi-inputs-container"></div>

            <button class="predict-button" onclick="predictMulti()">Predict Match</button>

            <div class="prediction-results" id="multi-results"></div>
        </div>

        <!-- Tournament Mode -->
        <div class="mode-content" id="tournament-mode">
            <div class="tournament-options">
                <div class="tournament-format">
                    <button class="format-button active" data-format="single_elimination">Single Elimination</button>
                    <button class="format-button" data-format="round_robin">Round Robin</button>
                </div>

                <div class="format-options">
                    <div class="format-option">
                        <label id="poolSizeLabel">Pool Size</label>
                        <select id="poolSize">
                            <option value="4">4</option>
                            <option value="8" selected>8</option>
                            <option value="16">16</option>
                            <option value="32">32</option>
                        </select>
                    </div>
                    <div class="format-option" id="blockCountOption" style="display: none;">
                        <label>Blocks</label>
                        <select id="blockCount">
                            <option value="1" selected>1 Block</option>
                            <option value="2">2 Blocks</option>
                            <option value="3">3 Blocks</option>
                            <option value="4">4 Blocks</option>
                        </select>
                    </div>
                    <div class="format-option" id="totalWrestlersInfo" style="display: none;">
                        <label>Total Wrestlers</label>
                        <span id="totalWrestlersCount" style="color: var(--accent); font-weight: 600; font-size: 1.1rem;">8</span>
                    </div>
                </div>

                <div class="tournament-wrestlers">
                    <div class="team-header">
                        <div class="team-title">Tournament Wrestlers</div>
                    </div>
                    <div class="wrestler-input-group" id="tournamentInputs">
                        <!-- Dynamic inputs will be generated here -->
                    </div>
                </div>
            </div>

            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
                <button class="simulate-button" onclick="simulateTournament()" style="margin-bottom: 0;">Simulate Tournament</button>
                <label style="display: flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 0.85rem; cursor: pointer;">
                    <input type="checkbox" id="deterministicToggle" style="accent-color: var(--accent);">
                    Favorites always win
                </label>
            </div>

            <div class="tournament-results" id="tournament-results"></div>
        </div>
    </div>

    <script>
        let allWrestlers = [];
        let currentMode = 'singles';
        let tournamentFormat = 'single_elimination';
        let selectedWrestlers = {}; // { team: { slot: wrestler } }

        // Load wrestlers on page load
        async function loadWrestlers() {
            try {
                const response = await fetch('/api/wrestler-slim');
                allWrestlers = await response.json();
                // Sort by ELO descending for better autocomplete
                allWrestlers.sort((a, b) => b.elo - a.elo);
            } catch (e) {
                console.error('Failed to load wrestlers:', e);
            }
        }

        // Mode switching
        document.querySelectorAll('.mode-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                // Update active tab
                document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');

                // Update active content
                document.querySelectorAll('.mode-content').forEach(c => c.classList.remove('active'));
                const mode = this.dataset.mode;
                document.getElementById(mode + '-mode').classList.add('active');
                
                currentMode = mode;
                clearResults();
            });
        });

        // Tournament format switching
        document.querySelectorAll('.format-button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.format-button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                tournamentFormat = this.dataset.format;
                
                // Show/hide block count option and update labels for round robin
                const blockOption = document.getElementById('blockCountOption');
                const totalInfo = document.getElementById('totalWrestlersInfo');
                const poolLabel = document.getElementById('poolSizeLabel');
                if (tournamentFormat === 'round_robin') {
                    blockOption.style.display = 'block';
                    totalInfo.style.display = 'block';
                    poolLabel.textContent = 'Per Block';
                    updateTotalWrestlers();
                } else {
                    blockOption.style.display = 'none';
                    totalInfo.style.display = 'none';
                    poolLabel.textContent = 'Pool Size';
                }
                
                generateTournamentInputs();
                clearResults();
            });
        });

        function updateTotalWrestlers() {
            const poolSize = parseInt(document.getElementById('poolSize').value);
            const blockCount = parseInt(document.getElementById('blockCount').value) || 1;
            const total = tournamentFormat === 'round_robin' ? poolSize * blockCount : poolSize;
            document.getElementById('totalWrestlersCount').textContent = total;
        }

        // Pool size / block count change handlers
        document.getElementById('poolSize').addEventListener('change', function() {
            updateTotalWrestlers();
            generateTournamentInputs();
            clearResults();
        });
        document.getElementById('blockCount').addEventListener('change', function() {
            updateTotalWrestlers();
            generateTournamentInputs();
            clearResults();
        });

        // Generate tournament inputs based on pool size (× blocks for round robin)
        function generateTournamentInputs() {
            const poolSize = parseInt(document.getElementById('poolSize').value);
            const blockCount = (tournamentFormat === 'round_robin') ? (parseInt(document.getElementById('blockCount').value) || 1) : 1;
            const totalWrestlers = poolSize * blockCount;
            const container = document.getElementById('tournamentInputs');
            container.innerHTML = '';
            
            const blockNames = ['A', 'B', 'C', 'D'];
            
            if (tournamentFormat === 'single_elimination') {
                // Draw a visual bracket with paired matchups
                container.style.cssText = 'display: flex; flex-direction: column; gap: 0;';
                const numMatches = totalWrestlers / 2;
                for (let m = 0; m < numMatches; m++) {
                    const matchDiv = document.createElement('div');
                    matchDiv.style.cssText = 'display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding: 10px; background: var(--bg-secondary); border-radius: 8px; border: 1px solid var(--border);';
                    matchDiv.innerHTML = `
                        <span style="color: var(--text-muted); font-size: 0.8rem; min-width: 24px;">R1-${m + 1}</span>
                        <div class="wrestler-input" style="flex: 1;">
                            <input type="text" placeholder="Wrestler ${m * 2 + 1}..." data-team="tournament" data-slot="${m * 2}" style="width: 100%;">
                            <div class="wrestler-dropdown"></div>
                        </div>
                        <span style="color: var(--text-muted); font-weight: 600;">vs</span>
                        <div class="wrestler-input" style="flex: 1;">
                            <input type="text" placeholder="Wrestler ${m * 2 + 2}..." data-team="tournament" data-slot="${m * 2 + 1}" style="width: 100%;">
                            <div class="wrestler-dropdown"></div>
                        </div>
                    `;
                    container.appendChild(matchDiv);
                }
            } else {
                // Round robin: list with block headers
                container.style.cssText = '';
                for (let i = 0; i < totalWrestlers; i++) {
                    if (blockCount > 1 && i % poolSize === 0) {
                        const blockHeader = document.createElement('div');
                        blockHeader.style.cssText = 'width: 100%; padding: 8px 0 4px; color: var(--accent); font-weight: 600; font-size: 0.9rem; border-top: 1px solid var(--border); margin-top: 8px;';
                        blockHeader.textContent = `Block ${blockNames[Math.floor(i / poolSize)] || Math.floor(i / poolSize) + 1}`;
                        container.appendChild(blockHeader);
                    }
                    const inputDiv = document.createElement('div');
                    inputDiv.className = 'wrestler-input';
                    const blockLabel = (blockCount > 1) ? `Block ${blockNames[Math.floor(i / poolSize)]} - ` : '';
                    inputDiv.innerHTML = `
                        <input type="text" placeholder="${blockLabel}Wrestler ${(i % poolSize) + 1}..." data-team="tournament" data-slot="${i}">
                        <div class="wrestler-dropdown"></div>
                    `;
                    container.appendChild(inputDiv);
                }
            }
            
            setupWrestlerInputs();
        }

        // Setup autocomplete for wrestler inputs
        function setupWrestlerInputs() {
            document.querySelectorAll('.wrestler-input input').forEach(input => {
                input.addEventListener('input', handleWrestlerSearch);
                input.addEventListener('focus', handleWrestlerSearch);
                input.addEventListener('blur', function() {
                    // Delay hiding dropdown to allow clicking
                    setTimeout(() => {
                        const dropdown = input.nextElementSibling;
                        dropdown.classList.remove('show');
                    }, 200);
                });
            });
        }

        function handleWrestlerSearch(e) {
            const input = e.target;
            const dropdown = input.nextElementSibling;
            const query = input.value.toLowerCase();

            if (query.length < 1) {
                dropdown.classList.remove('show');
                return;
            }

            const matches = allWrestlers.filter(w => 
                w.name.toLowerCase().includes(query) ||
                (w.promotion || '').toLowerCase().includes(query)
            ).sort((a, b) => {
                const an = a.name.toLowerCase(), bn = b.name.toLowerCase();
                const aExact = an === query, bExact = bn === query;
                if (aExact !== bExact) return aExact ? -1 : 1;
                const aStarts = an.startsWith(query), bStarts = bn.startsWith(query);
                if (aStarts !== bStarts) return aStarts ? -1 : 1;
                return an.localeCompare(bn);
            }).slice(0, 10);

            if (matches.length === 0) {
                dropdown.classList.remove('show');
                return;
            }

            dropdown.innerHTML = matches.map(w => `
                <div class="wrestler-option" data-id="${w.id}">
                    <div class="wrestler-option-name">${w.name}</div>
                    <div class="wrestler-option-details">
                        ${w.promotion || 'Freelance'} • ELO: ${Math.round(w.elo)} • Momentum: ${formatMomentum(w.momentum)}
                    </div>
                </div>
            `).join('');

            dropdown.classList.add('show');

            // Add click handlers
            dropdown.querySelectorAll('.wrestler-option').forEach(option => {
                option.addEventListener('click', function() {
                    const wrestlerId = parseInt(this.dataset.id);
                    const wrestler = allWrestlers.find(w => w.id === wrestlerId);
                    
                    input.value = wrestler.name;
                    dropdown.classList.remove('show');
                    
                    // Store selection
                    const team = input.dataset.team;
                    const slot = parseInt(input.dataset.slot);
                    
                    if (!selectedWrestlers[team]) selectedWrestlers[team] = {};
                    selectedWrestlers[team][slot] = wrestler;
                    
                    clearResults();
                });
            });
        }

        function formatMomentum(momentum) {
            const val = Math.abs(momentum).toFixed(1);
            const color = momentum > 0 ? '#4ade80' : momentum < 0 ? 'var(--red)' : 'var(--text-muted)';
            const arrow = momentum > 0 ? '▲' : momentum < 0 ? '▼' : '-';
            return `<span style="color:${color};font-weight:600">${arrow} ${val}</span>`;
        }

        async function predictMatch(mode) {
            const team1Wrestlers = [];
            const team2Wrestlers = [];
            
            // Get wrestlers for each team
            let count;
            if (mode === 'singles') count = 1;
            else if (mode === 'team') count = parseInt(document.getElementById('teamSize').value);
            else count = 1; // shouldn't hit this for multi
            
            for (let i = 0; i < count; i++) {
                if (selectedWrestlers['1'] && selectedWrestlers['1'][i]) {
                    team1Wrestlers.push(selectedWrestlers['1'][i].id);
                }
                if (selectedWrestlers['2'] && selectedWrestlers['2'][i]) {
                    team2Wrestlers.push(selectedWrestlers['2'][i].id);
                }
            }
            
            if (team1Wrestlers.length === 0 || team2Wrestlers.length === 0) {
                alert('Please select at least 1 wrestler per team.');
                return;
            }
            
            try {
                const response = await fetch('/api/predict/match', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        team1_wrestler_ids: team1Wrestlers,
                        team2_wrestler_ids: team2Wrestlers
                    })
                });
                
                const result = await response.json();
                displayMatchPrediction(result, mode);
            } catch (e) {
                console.error('Prediction failed:', e);
                alert('Failed to predict match. Please try again.');
            }
        }

        function hideInputsShowResults(modeId) {
            const modeEl = document.getElementById(modeId);
            // Hide everything except results container — only set wasHidden if not already hidden
            Array.from(modeEl.children).forEach(el => {
                if (!el.classList.contains('prediction-results') && !el.classList.contains('tournament-results')) {
                    if (el.dataset.wasHidden === undefined) {
                        el.dataset.wasHidden = el.style.display;
                    }
                    el.style.display = 'none';
                }
            });
        }

        function showInputsHideResults(modeId) {
            const modeEl = document.getElementById(modeId);
            Array.from(modeEl.children).forEach(el => {
                if (el.dataset.wasHidden !== undefined) {
                    el.style.display = el.dataset.wasHidden || '';
                    delete el.dataset.wasHidden;
                }
            });
            // Hide results
            modeEl.querySelectorAll('.prediction-results, .tournament-results').forEach(el => {
                el.classList.remove('show');
            });
        }

        function displayMatchPrediction(result, mode) {
            const container = document.getElementById(mode + '-results');
            
            const team1Prob = (result.team1_probability * 100).toFixed(1);
            const team2Prob = (result.team2_probability * 100).toFixed(1);
            const t1Favored = result.team1_probability >= result.team2_probability;
            
            container.innerHTML = `
                <button class="back-button" onclick="showInputsHideResults('${mode}-mode')">← Back to inputs</button>
                <div class="team-stats">
                    <div class="stat-group" style="border: 2px solid ${t1Favored ? '#4ade80' : 'var(--red)'}; border-radius: 12px;">
                        <div class="stat-group-title" style="display: flex; justify-content: space-between; align-items: center;">
                            <span>Team 1</span>
                            <span style="color: ${t1Favored ? '#4ade80' : 'var(--red)'}; font-size: 1.4rem; font-weight: 700;">${team1Prob}%</span>
                        </div>
                        ${result.team1_wrestlers.map(w => `
                            <div style="margin-bottom: 8px; padding: 8px; background: var(--bg-secondary); border-radius: 6px;">
                                <div class="stat-item">
                                    <span class="stat-label">${w.name}</span>
                                    <span class="stat-value">${Math.round(w.elo)} ELO ${formatMomentum(w.momentum)}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="stat-group" style="border: 2px solid ${!t1Favored ? '#4ade80' : 'var(--red)'}; border-radius: 12px;">
                        <div class="stat-group-title" style="display: flex; justify-content: space-between; align-items: center;">
                            <span>Team 2</span>
                            <span style="color: ${!t1Favored ? '#4ade80' : 'var(--red)'}; font-size: 1.4rem; font-weight: 700;">${team2Prob}%</span>
                        </div>
                        ${result.team2_wrestlers.map(w => `
                            <div style="margin-bottom: 8px; padding: 8px; background: var(--bg-secondary); border-radius: 6px;">
                                <div class="stat-item">
                                    <span class="stat-label">${w.name}</span>
                                    <span class="stat-value">${Math.round(w.elo)} ELO ${formatMomentum(w.momentum)}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            container.classList.add('show');
            hideInputsShowResults(mode + '-mode');
        }

        async function simulateTournament() {
            const poolSize = parseInt(document.getElementById('poolSize').value);
            const blockCount = (tournamentFormat === 'round_robin') ? (parseInt(document.getElementById('blockCount').value) || 1) : 1;
            const totalWrestlers = poolSize * blockCount;
            const wrestlerIds = [];
            
            // Collect selected wrestlers
            for (let i = 0; i < totalWrestlers; i++) {
                if (selectedWrestlers['tournament'] && selectedWrestlers['tournament'][i]) {
                    wrestlerIds.push(selectedWrestlers['tournament'][i].id);
                }
            }
            
            if (wrestlerIds.length !== totalWrestlers) {
                alert(`Please select all ${totalWrestlers} wrestlers for the tournament.`);
                return;
            }
            
            try {
                const response = await fetch('/api/predict/tournament', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        format: tournamentFormat,
                        wrestler_ids: wrestlerIds,
                        block_count: blockCount,
                        deterministic: document.getElementById('deterministicToggle').checked
                    })
                });
                
                const result = await response.json();
                displayTournamentResults(result);
            } catch (e) {
                console.error('Tournament simulation failed:', e);
                alert('Failed to simulate tournament. Please try again.');
            }
        }

        function displayTournamentResults(result) {
            const container = document.getElementById('tournament-results');
            
            if (result.format === 'single_elimination') {
                displaySingleEliminationResults(result.results, container);
            } else if (result.format === 'round_robin') {
                displayRoundRobinResults(result.results, container);
            }
            
            container.classList.add('show');
            hideInputsShowResults('tournament-mode');
        }

        function tournamentBackButtons(showReroll) {
            return `
                <div style="margin-bottom: 16px; display: flex; gap: 12px; align-items: center;">
                    <button class="back-button" onclick="showInputsHideResults('tournament-mode')">← Back to inputs</button>
                    ${showReroll ? '<button class="simulate-button" onclick="simulateTournament()" style="margin: 0; padding: 8px 16px; font-size: 0.85rem;">🎲 Reroll</button>' : ''}
                </div>
            `;
        }

        function displaySingleEliminationResults(bracket, container) {
            const winnerHtml = bracket.winner ? `
                <div style="text-align: center; margin-bottom: 24px; padding: 20px; background: var(--accent-glow); border: 1px solid var(--accent); border-radius: 12px;">
                    <h2 style="color: var(--accent); margin: 0;">🏆 Tournament Winner</h2>
                    <h3 style="margin: 8px 0 0 0;">${bracket.winner.name}</h3>
                </div>
            ` : '';
            
            container.innerHTML = `
                ${tournamentBackButtons(!document.getElementById('deterministicToggle').checked)}
                ${winnerHtml}
                <div class="bracket-container">
                    ${bracket.rounds.map((round, roundIndex) => `
                        <div class="bracket-round">
                            <div class="bracket-round-header">${getRoundName(roundIndex, bracket.rounds.length)}</div>
                            ${round.map(match => {
                                const w1wins = match.winner && match.winner.id === match.wrestler1.id;
                                const w2wins = match.winner && match.winner.id === match.wrestler2.id;
                                const p1 = (match.probability1 * 100).toFixed(0);
                                const p2 = (match.probability2 * 100).toFixed(0);
                                return `
                                    <div class="bracket-match">
                                        <div class="bracket-wrestler ${w1wins ? 'winner' : w2wins ? 'loser' : ''}">
                                            <span class="bracket-wrestler-name">${match.wrestler1.name}</span>
                                            <span class="bracket-probability ${match.probability1 >= match.probability2 ? 'favored' : 'underdog'}">${p1}%</span>
                                        </div>
                                        <div class="bracket-wrestler ${w2wins ? 'winner' : w1wins ? 'loser' : ''}">
                                            <span class="bracket-wrestler-name">${match.wrestler2.name}</span>
                                            <span class="bracket-probability ${match.probability2 >= match.probability1 ? 'favored' : 'underdog'}">${p2}%</span>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                        ${roundIndex < bracket.rounds.length - 1 ? '<div class="bracket-connector"></div>' : ''}
                    `).join('')}
                </div>
            `;
        }

        function displayRoundRobinResults(results, container) {
            container.innerHTML = tournamentBackButtons(false) + results.blocks.map(block => `
                <div class="round-robin-block">
                    <div class="block-title">Block ${block.block_name}</div>
                    
                    <table class="standings-table">
                        <thead>
                            <tr>
                                <th>Wrestler</th>
                                <th>Points</th>
                                <th>Record</th>
                                <th>ELO</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${block.standings.map(result => `
                                <tr>
                                    <td>${result.wrestler.name}</td>
                                    <td><strong>${result.points}</strong></td>
                                    <td>${result.wins}-${result.losses}-${result.draws}</td>
                                    <td>${Math.round(result.wrestler.elo)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    
                    <div class="matches-section">
                        <h4 style="color: var(--text-primary); margin-bottom: 12px;">Matches</h4>
                        ${block.matches.map(match => `
                            <div class="match-result">
                                <div class="match-wrestlers">
                                    ${match.wrestler1.name} vs ${match.wrestler2.name}
                                </div>
                                <div class="match-result-text">
                                    ${match.is_draw ? 'Draw' : 
                                      match.winner ? `${match.winner.name} wins` : 'TBD'}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function getRoundName(roundIndex, totalRounds) {
            if (totalRounds === 1) return 'Final';
            if (roundIndex === totalRounds - 1) return 'Final';
            if (roundIndex === totalRounds - 2) return 'Semifinal';
            if (roundIndex === totalRounds - 3) return 'Quarterfinal';
            return `Round ${roundIndex + 1}`;
        }

        function clearResults() {
            document.querySelectorAll('.mode-content').forEach(modeEl => {
                // Restore any hidden inputs
                Array.from(modeEl.children).forEach(el => {
                    if (el.dataset.wasHidden !== undefined) {
                        el.style.display = el.dataset.wasHidden || '';
                        delete el.dataset.wasHidden;
                    }
                });
            });
            document.querySelectorAll('.prediction-results, .tournament-results').forEach(el => {
                el.classList.remove('show');
            });
        }

        // Generate team mode inputs
        function generateTeamInputs() {
            const size = parseInt(document.getElementById('teamSize').value);
            const container = document.getElementById('team-inputs-container');
            container.innerHTML = '';
            // Clear selected wrestlers for team mode
            selectedWrestlers['1'] = {};
            selectedWrestlers['2'] = {};
            
            for (let t = 1; t <= 2; t++) {
                const section = document.createElement('div');
                section.className = 'team-section';
                section.innerHTML = `<div class="team-header"><div class="team-title">Team ${t}</div></div><div class="wrestler-input-group"></div>`;
                const group = section.querySelector('.wrestler-input-group');
                for (let i = 0; i < size; i++) {
                    const div = document.createElement('div');
                    div.className = 'wrestler-input';
                    div.innerHTML = `<input type="text" placeholder="Wrestler ${i+1}..." data-team="${t}" data-slot="${i}"><div class="wrestler-dropdown"></div>`;
                    group.appendChild(div);
                }
                container.appendChild(section);
            }
            setupWrestlerInputs();
        }

        // Generate multi mode inputs
        function generateMultiInputs() {
            const size = parseInt(document.getElementById('multiSize').value);
            const container = document.getElementById('multi-inputs-container');
            container.innerHTML = '';
            selectedWrestlers['multi'] = {};
            
            for (let i = 0; i < size; i++) {
                const section = document.createElement('div');
                section.className = 'team-section';
                section.innerHTML = `<div class="team-header"><div class="team-title">Wrestler ${i+1}</div></div><div class="wrestler-input-group"><div class="wrestler-input"><input type="text" placeholder="Search for a wrestler..." data-team="multi" data-slot="${i}"><div class="wrestler-dropdown"></div></div></div>`;
                container.appendChild(section);
            }
            setupWrestlerInputs();
        }

        // Multi prediction — each wrestler is their own "team"
        async function predictMulti() {
            const size = parseInt(document.getElementById('multiSize').value);
            const wrestlerIds = [];
            
            for (let i = 0; i < size; i++) {
                if (selectedWrestlers['multi'] && selectedWrestlers['multi'][i]) {
                    wrestlerIds.push(selectedWrestlers['multi'][i].id);
                }
            }
            
            if (wrestlerIds.length !== size) {
                alert(`Please select all ${size} wrestlers.`);
                return;
            }
            
            try {
                const response = await fetch('/api/predict/multi', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ wrestler_ids: wrestlerIds })
                });
                
                const result = await response.json();
                displayMultiPrediction(result);
            } catch (e) {
                console.error('Multi prediction failed:', e);
                alert('Failed to predict. Please try again.');
            }
        }

        function displayMultiPrediction(result) {
            const container = document.getElementById('multi-results');
            
            // Sort by probability descending
            const sorted = [...result.wrestlers].sort((a, b) => b.probability - a.probability);
            const maxProb = sorted[0].probability;
            
            container.innerHTML = `
                <button class="back-button" onclick="showInputsHideResults('multi-mode')">← Back to inputs</button>
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    ${sorted.map((w, i) => {
                        const prob = (w.probability * 100).toFixed(1);
                        const barWidth = (w.probability / maxProb * 100).toFixed(0);
                        const isTop = i === 0;
                        return `
                            <div style="background: var(--bg-secondary); border-radius: 8px; padding: 12px; border: 2px solid ${isTop ? '#4ade80' : 'var(--border)'};">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                                    <span style="font-weight: 600; color: var(--text-primary);">${isTop ? '👑 ' : ''}${w.name}</span>
                                    <span style="color: ${isTop ? '#4ade80' : 'var(--red)'}; font-weight: 700; font-size: 1.1rem;">${prob}%</span>
                                </div>
                                <div style="background: var(--bg-primary); border-radius: 4px; height: 6px; overflow: hidden;">
                                    <div style="background: ${isTop ? '#4ade80' : 'var(--accent)'}; height: 100%; width: ${barWidth}%; border-radius: 4px;"></div>
                                </div>
                                <div style="display: flex; gap: 12px; margin-top: 6px; font-size: 0.8rem; color: var(--text-muted);">
                                    <span>ELO: ${Math.round(w.elo)}</span>
                                    <span>${formatMomentum(w.momentum)}</span>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
            
            container.classList.add('show');
            hideInputsShowResults('multi-mode');
        }

        document.getElementById('teamSize').addEventListener('change', generateTeamInputs);
        document.getElementById('multiSize').addEventListener('change', generateMultiInputs);

        // Initialize
        loadWrestlers().then(() => {
            setupWrestlerInputs();
            generateTeamInputs();
            generateMultiInputs();
            generateTournamentInputs();
        });
    </script>
    <script src="/static/js/nav-search.js?v=2"></script>
    <script src="/static/js/nav-burger.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/footer.js"></script>
</body>
</html>
